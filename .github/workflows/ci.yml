name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # postinstall ruft `prisma generate`; vitest.config.js setzt DATABASE_URL
      # (file:./test.db) + JWT_SECRET inline, tests/global-setup.js legt die
      # Test-DB an - kein .env noetig.
      - run: npm ci
      - run: npm test

  e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Beide Workspaces: die Playwright-webServer-Config (frontend/playwright
      # .config.js) startet Backend (node src/index.js) UND Frontend-Preview
      # selbst, beides braucht installierte Deps.
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
