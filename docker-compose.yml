services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: file:/data/haushalt.db
      NODE_ENV: production
    volumes:
      - db-data:/data
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal
    restart: unless-stopped

volumes:
  db-data:

networks:
  internal:
