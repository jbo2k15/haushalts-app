server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 2m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript text/xml application/xml;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=()" always;

    # SSE endpoint: strip ?token= from nginx access log to avoid JWT leakage
    location = /api/events {
        proxy_pass http://backend:3001/api/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        access_log off;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service Worker and manifest must never be cached so updates are detected immediately
    location ~* (sw\.js|workbox-[^.]+\.js|manifest\.webmanifest)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # index.html must not be cached so the browser always fetches the latest entry point
    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # Hashed assets can be cached indefinitely
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
